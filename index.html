<!DOCTYPE html>
<html>
<head>
<title>Login</title>
</head>
<style>
body {
    font-family: Arial;
    text-align: center;
    margin-top: 100px;
}

input {
    padding: 10px;
    width: 200px;
}

button {
    padding: 10px 20px;
    background-color: black;
    color: white;
    border: none;
    cursor: pointer;
}
</style>

<body>

<h2>Login</h2>

<input type="text" id="loginUser" placeholder="Enter username"><br><br>
<input type="password" id="loginPass" placeholder="Enter password"><br><br>

<button onclick="login()">Login</button>

<script>
function login() {
    var user = document.getElementById("loginUser").value;
    var pass = document.getElementById("loginPass").value;

    var savedUser = localStorage.getItem("username");
    var savedPass = localStorage.getItem("password");

    if(user === savedUser && pass === savedPass){
        alert("Login successful 😎");
window.location.href="dashboard.html";
    } else {
        alert("Invalid credentials ❌");
    }

}
</script>

</body>
</html>
