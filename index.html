<!DOCTYPE html>
<html>
<head>
<title>Login</title>
</head>
<style>
body {
    font-family: Arial;
    text-align: center;
    margin-top: 100px;
}

input {
    padding: 10px;
    width: 200px;
}

button {
    padding: 10px 20px;
    background-color: black;
    color: white;
    border: none;
    cursor: pointer;
}
</style>

<body>

<h2>Login</h2>

<input type="text" id="loginUser" placeholder="Enter username"><br><br>
<input type="password" id="loginPass" placeholder="Enter password"><br><br>
    <button onclick="login()">Login</button>
     <p>Don't have an account?</p>
<button onclick="goToSignup()">Signup</button>


   

<script>
    let isLoggedIn = localStorage.getItem("isLoggedIn");

if(isLoggedIn === "true"){
    window.location.href = "dashboard.html";
}
function login() {
    var user = document.getElementById("loginUser").value;
    var pass = document.getElementById("loginPass").value;

    let users = JSON.parse(localStorage.getItem("users")) || [];

    let validUser = users.find(u => u.username === user && u.password === pass);

    if(validUser){
        localStorage.setItem("isLoggedIn", "true");
        localStorage.setItem("loggedInUser", user); // 🔥 important

        alert("Login successful 😎");
        window.location.href = "dashboard.html";
    } else {
        alert("Invalid credentials ❌");
    }
}

    function goToSignup(){
        alert("signup clicked");
    window.location.href = "signup.html";
    }
</script>

</body>
</html>
